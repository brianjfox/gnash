# CLA Assistant Lite: block pull requests until every contributor has signed
# the Contributor License Agreement (CLA.md).
#
# A contributor signs once by leaving a PR comment with the exact phrase:
#   I have read the CLA Document and I hereby sign the CLA
# Their GitHub username is then recorded in signatures/version1/cla.json and
# they are never asked again.  Re-comment "recreate-signatures" (maintainers)
# to rebuild the signature check.
#
# Setup required once (see the runbook in the PR / commit message):
#   1. A repo secret named CLA_SIGNATURES_TOKEN holding a Personal Access Token
#      with permission to write this repo (classic: `repo` scope; fine-grained:
#      Contents + Pull requests = Read/Write).  The bot uses it to store
#      signatures and to comment.
#   2. Make the "CLA Assistant" check a required status check on the protected
#      branch so PRs cannot merge until it passes.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

# pull_request_target runs with the base-repo token so the bot can comment and
# record signatures even for pull requests opened from forks.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recreate-signatures' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        # Pin to the latest release of contributor-assistant/github-action.
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-document: 'https://github.com/brianjfox/gnash/blob/main/CLA.md'
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'main'
          # People who never need to sign (the maintainer, bots).
          allowlist: brianjfox,*[bot]
          custom-notsigned-prcomment: >-
            Thank you for your contribution to gnash. Before it can be merged,
            please read our [Contributor License Agreement](https://github.com/brianjfox/gnash/blob/main/CLA.md)
            and sign it by posting a new comment on this pull request containing
            exactly the line below (nothing else):
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✍️ ✅'
